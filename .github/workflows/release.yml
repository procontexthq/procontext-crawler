name: Release

# Manual-only release flow.
#
# Before triggering this workflow:
#   1. Bump `version` in pyproject.toml on main.
#   2. Finalize the matching CHANGELOG.md section.
#   3. Commit and push the bump to main.
#   4. Trigger this workflow from the Actions tab.
#
# A second manual gate lives on the `pypi` GitHub Environment: configure it
# with required reviewers so the `release` job cannot publish until a
# maintainer approves the run.

on:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  validate:
    name: Validate release inputs
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Install dependencies
        run: uv sync --dev --frozen

      - name: Lint
        run: uv run ruff check src/ tests/

      - name: Format check
        run: uv run ruff format --check src/ tests/

      - name: Type check
        run: uv run pyright src/

      - name: Tests with coverage
        run: |
          uv run pytest tests/ \
            --cov=src/proctx_crawler \
            --cov-report=term-missing \
            --cov-fail-under=90

      - name: Dependency audit
        run: uv run pip-audit --skip-editable

      - name: Verify version is releasable
        run: |
          VERSION="$(grep -m1 '^version = "' pyproject.toml | sed -E 's/version = "([^"]+)"/\1/')"
          if [ -z "$VERSION" ]; then
            echo "Could not read version from pyproject.toml" >&2
            exit 1
          fi
          echo "Releasing version: $VERSION"
          if git rev-parse --verify --quiet "refs/tags/v$VERSION" >/dev/null; then
            echo "Tag v$VERSION already exists — bump the version in pyproject.toml before releasing." >&2
            exit 1
          fi

  package-smoke:
    name: Package smoke before release
    runs-on: ubuntu-latest
    needs: validate
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Install dependencies
        run: uv sync --dev --frozen

      - name: Build package
        run: uv build

      - name: Install built wheel into clean virtual environment
        run: |
          python -m venv .pkg-smoke
          ./.pkg-smoke/bin/pip install dist/*.whl

      - name: Verify installed CLI entrypoint
        run: ./.pkg-smoke/bin/proctx-crawler --help

  release:
    name: Release
    runs-on: ubuntu-latest
    needs: [validate, package-smoke]
    # Configure the `pypi` environment on GitHub with required reviewers to
    # enforce manual approval before this job publishes. See:
    # https://docs.github.com/en/actions/deployment/targeting-different-environments/using-environments-for-deployment
    environment:
      name: pypi
    permissions:
      contents: write
      id-token: write
      attestations: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Install dependencies
        run: uv sync --dev --frozen

      - name: Read release version
        id: version
        run: |
          VERSION="$(grep -m1 '^version = "' pyproject.toml | sed -E 's/version = "([^"]+)"/\1/')"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Build package
        run: uv build

      - name: Attest build provenance
        uses: actions/attest-build-provenance@v1
        with:
          subject-path: dist/

      - name: Publish to PyPI
        # Requires a Trusted Publisher configured on pypi.org:
        #   Owner:    procontexthq
        #   Repo:     procontext-crawler
        #   Workflow: release.yml
        #   Env:      pypi
        run: uv publish --trusted-publishing always

      - name: Tag release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "v${{ steps.version.outputs.version }}" -m "Release v${{ steps.version.outputs.version }}"
          git push origin "v${{ steps.version.outputs.version }}"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "v${{ steps.version.outputs.version }}" \
            --title "v${{ steps.version.outputs.version }}" \
            --notes "See [CHANGELOG.md](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md) for release notes." \
            dist/*

      - name: Post-publish uvx smoke
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          for attempt in 1 2 3 4 5; do
            if uvx "proctx-crawler@$VERSION" --help; then
              exit 0
            fi
            if [ "$attempt" -eq 5 ]; then
              echo "Published package smoke failed for proctx-crawler@$VERSION" >&2
              exit 1
            fi
            sleep "$((attempt * 15))"
          done
